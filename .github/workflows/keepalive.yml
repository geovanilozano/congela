name: Keep Neon awake

# Neon (plan gratis) suspende la base de datos tras ~5 min de inactividad, y el
# primer clic del usuario paga el arranque en frío. Este workflow la mantiene
# despierta haciendo ping a /api/keepalive cada ~1 minuto.
#
# Vercel Hobby no permite cron más frecuente que 1 vez al día, por eso se hace
# desde GitHub Actions (gratis e ilimitado en repos públicos). GitHub solo dispara
# el cron cada 5 min como mínimo, así que dentro de cada ejecución se hace ping
# repetido cada 60s para cubrir toda la ventana de 5 minutos.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {} # permite dispararlo a mano para probar

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping cada ~60s durante ~5 min
        run: |
          URL="https://congela.vercel.app/api/keepalive"
          for i in $(seq 1 5); do
            if curl -fsS --max-time 30 "$URL" > /dev/null; then
              echo "ping $i OK"
            else
              echo "ping $i FALLÓ"
            fi
            if [ "$i" -lt 5 ]; then sleep 60; fi
          done
          echo "listo"
